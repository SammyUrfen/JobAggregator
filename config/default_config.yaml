# Default (seed) configuration. On first `initdb`, this is loaded into the single-row
# `config` table (as JSON). Thereafter the DASHBOARD is the source of truth — edits there
# take effect on the NEXT run. This file is only the initial seed + a schema reference.
# Keep it in sync with the Pydantic models in src/job_aggregator/config/schema.py.

keywords:
  # roles: a role word must appear in the title/description. Kept BROAD on purpose — `must_have`
  # below carries the real relevance filtering, so a generic "software engineer" is fine here and a
  # narrow list (missing "software engineer"/"developer") would wrongly drop most real SWE postings.
  roles:
    - backend engineer
    - backend developer
    - software engineer
    - software developer
    - systems engineer
    - systems software
    - distributed systems
    - infrastructure engineer
    - platform engineer
    - site reliability
    - database engineer
    - data engineer
    - devops
    - cloud engineer
    - ml engineer
    - machine learning engineer
    - ai engineer
    - llm engineer
    - mlops
    - reinforcement learning
    - golang developer
    - python developer
    - sde
    - backend
  # bonus: +score if present in title/description; never required.
  bonus:
    - Go
    - Golang
    - Rust
    - C++
    - PyTorch
    - RAG
    - LLM
    - GRPO
    - LoRA
    - inference
    - storage engine
    - consistent hashing
    - kubernetes
    - kafka
  # must_have: at least one of these stack anchors must appear (title/description) or the job is
  # dropped as off-domain. This is what stops a generic "Software Engineer" title on an embedded or
  # teaching post from passing. Empty list disables the gate.
  must_have:
    - backend
    - distributed
    - systems
    - infrastructure
    - platform
    - database
    - go
    - golang
    - python
    - c++
    - kubernetes
    - docker
    - microservice
    - api
    - machine learning
    - ml
    - deep learning
    - llm
    - reinforcement learning
    - inference
    - pytorch
  # level_required: at least one must appear (title/description) when require_level is true.
  level_required:
    - intern
    - internship
    - trainee
    - new grad
    - graduate engineer
    - junior
  # exclude: hard drop if any appears in the title.
  exclude:
    - senior
    - staff
    - principal
    - lead
    - manager
    - director
    - "5+ years"
    - "clearance required"
    # off-stack DOMAINS (title screen) — not the user's field
    - embedded
    - firmware
    - hardware
    - rust
    - verilog
    - vhdl
    - fpga
    - teacher
    - teaching
    - tutor
    - instructor
    - faculty
    - curriculum
    - music
    - mechanical
    - electrical
    - civil
    - sales
    - marketing
    - recruiter
    - accountant
    - nursing
  # require_level=false: an explicit "intern/junior/new grad" word is NOT required — most real
  # entry/mid postings don't use those words, and require_level=true dropped ~half of all jobs.
  # Relevance comes from roles + must_have + exclude (which screens senior/staff/lead/etc.).
  require_level: false

locations:
  - "Bengaluru, India"
  - Bangalore
  - India
  - Remote
  - "Remote - India"
  - Worldwide
remote_preferred: true

salary:
  currency: INR
  period: month
  min_remote: 30000        # INR/month floor for a REMOTE role to pass
  min_in_office: 80000     # INR/month floor for an IN-OFFICE role to pass
  on_missing: keep_and_flag   # keep_and_flag | drop  (most Indian internships have no salary)
  demote_in_office_if_unknown: true
  # Approximate FX rates for normalizing foreign pay to INR/month. Update as needed.
  fx_rates:
    USD: 83.0
    EUR: 90.0
    GBP: 105.0

schedule:
  run_hour_local: 3        # daily run at 03:00 local time
  hours_old: 48            # incremental fetch window (>= 24h + slack for slow feeds)
  grace_days: 3            # a vanished posting goes stale -> deleted after this many days
  catch_up_on_startup: true   # if the laptop was asleep at run_hour, run on next startup

sources:
  jobspy:
    enabled: true
    sites: [linkedin, indeed]   # naukri=406 recaptcha, google=~10 results/query; both dropped
    search_terms: ["backend intern", "systems intern", "ml intern", "golang intern"]
    location: "Bengaluru, India"
    country_indeed: india
    is_remote: true
    results_wanted: 40
    hours_old: 48
    proxies: []            # add ONLY for LinkedIn at volume (guest endpoint 429s ~10 pages/IP)
  unstop:
    enabled: true
    opportunities: [internships, jobs]
    search_terms: [backend, "machine learning"]
    max_age_days: 30      # endpoint surfaces stale (2022) posts; recency filter is mandatory
    max_pages: 5          # pages walked per opportunity before stopping (also stops when empty)
  remoteok:
    enabled: true         # element[0] of the API is a legal notice — skip it; attribution required
  himalayas:
    enabled: true
    country: IN           # ~24h refresh: coverage, not freshness
  jobicy:
    enabled: true
    job_type: internship
  adzuna:
    enabled: true
    country: in           # keys via env ADZUNA_APP_ID / ADZUNA_APP_KEY
    max_pages: 10         # pages of 50 walked before stopping (also stops on empty/short page)
  jooble:
    enabled: true         # key via env JOOBLE_API_KEY
    max_pages: 10         # pages walked before stopping (also stops when the API returns none)
  remotive:
    enabled: false        # 24h-delayed + 4 calls/day cap; enable only if you need it
  ats:
    greenhouse:
      enabled: true
      tokens: []          # e.g. [razorpay, postman] — see docs/ats_token_lists.md
    lever:
      enabled: true
      slugs: []
    ashby:
      enabled: true
      orgs: []            # case-sensitive
    smartrecruiters:
      enabled: true
      company_ids: []     # supports ?country=in

# Explicitly unsupported dead ends (documented in research.md): twitter, wellfound,
# hiring_cafe (API Cloudflare-locked; browse manually), jsearch (200 req/month free tier).

resume:
  # Backend for per-role résumé tailoring: "openai_compatible" (HTTP endpoint) or "coding_agent"
  # (a local CLI like Claude Code). The API key is read from the env var named below, never here.
  # "coding_agent" = Claude Code headless (`claude -p`) — NO API key needed (default). Switch to
  # "openai_compatible" only if you'd rather call an HTTP endpoint (then set the key env in .env).
  backend: coding_agent
  base_url: https://api.openai.com/v1
  model: gpt-4o-mini
  api_key_env: OPENAI_API_KEY
  agent_command: [claude, -p]   # used only when backend = coding_agent
  max_projects: 4               # projects to include on the tailored résumé
  temperature: 0.2              # low = truthful/deterministic

apply:
  enabled: false                # the browser apply agent (Track D) is opt-in; OFF by default
  auto_submit: false            # deliberately unsupported: you always review + submit yourself

notify:
  on: new_only
  telegram:
    enabled: false        # bot_token/chat_id via env
  email:
    enabled: false
    smtp_host: localhost
    smtp_port: 25
    to: ""
  rss:
    enabled: true
    path: "data/feed.xml"
    max_items: 100
