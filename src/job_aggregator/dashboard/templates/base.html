<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}JobAggregator{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', path='favicon.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', path='css/theme.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', path='css/app.css') }}">
  <script>
    /* anti-FOUC: apply the saved theme before first paint (beats the OS preference). */
    (function () {
      var t = localStorage.getItem("jobagg-theme");
      if (t === "light" || t === "dark") document.documentElement.setAttribute("data-theme", t);
    })();
  </script>
</head>
<body>
  <header class="app-header">
    <span class="brand">🩸 JobAggregator</span>
    <nav>
      <a href="/">Jobs</a>
      <a href="/runs">Runs</a>
      <a href="/config">Config</a>
    </nav>
    <span class="spacer"></span>
    <span class="run-summary muted mono" id="run-summary">
      {%- if last_run -%}
        Last: {{ last_run.status }} · new {{ last_run.n_new }}
      {%- else -%}
        No runs yet
      {%- endif -%}
      {%- if next_run_at %} · Next {{ next_run_at }}{% endif -%}
    </span>
    <button class="btn" id="run-now-btn" type="button" onclick="runNow()">Run now</button>
    <button class="btn secondary" type="button" onclick="toggleTheme()" aria-label="Toggle theme">◐</button>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', path='js/app.js') }}"></script>
</body>
</html>
