<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}JobAggregator{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', path='favicon.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', path='css/theme.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', path='css/app.css') }}">
</head>
<body>
  <header class="app-header">
    <span class="brand">🩸 JobAggregator</span>
    <nav>
      <a href="/">Jobs</a>
      <a href="/runs">Runs</a>
      <a href="/config">Config</a>
    </nav>
    <span class="spacer"></span>
    {# TODO(Phase 8): last-run summary + next-run time injected here #}
    <button class="btn" onclick="runNow()">Run now</button>
    <button class="btn secondary" onclick="toggleTheme()">◐</button>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', path='js/app.js') }}"></script>
</body>
</html>
