{% from 'partials/_macros.html' import salary_badge, quick_actions %}
{#- Modal body for one job. `description_html` is the source description rendered into a SAFE
    allowlisted-HTML subset server-side (see routes_jobs.render_description_html), so |safe is sound:
    no source attribute, <script>, or javascript:/data: URL can execute. -#}
<div class="jd" data-uid="{{ job.job_uid }}">
  <header class="jd-head">
    <div class="jd-headings">
      <h2 class="jd-title" id="job-modal-title">{{ job.title }}</h2>
      <div class="jd-company">
        {{ job.company }}{% if job.location %} · {{ job.location }}{% endif %}
      </div>
    </div>
    <button type="button" class="modal-close" data-modal-close aria-label="Close details">✕</button>
  </header>

  <div class="jd-badges">
    {% if job.is_remote %}
      <span class="badge remote">Remote</span>
    {% else %}
      <span class="badge onsite">On-site</span>
    {% endif %}
    {{ salary_badge(job) }}
    <span class="badge source">{{ job.source }}</span>
    <span class="badge status status-{{ job.status }}">{{ job.status }}</span>
    {% if job.match_score is not none %}
      <span class="badge mono">score {{ '%.0f'|format(job.match_score) }}</span>
    {% endif %}
  </div>

  <dl class="jd-facts mono">
    <div><dt>Posted</dt><dd>{{ job.posted_at or '—' }}</dd></div>
    <div><dt>First seen</dt><dd>{{ job.first_seen_at }}</dd></div>
    <div><dt>Last seen</dt><dd>{{ job.last_seen_at }}</dd></div>
    {% if job.salary_raw %}<div><dt>Salary (raw)</dt><dd>{{ job.salary_raw }}</dd></div>{% endif %}
  </dl>

  <div class="jd-desc">
    {% if description_html %}
      <div class="jd-desc-body">{{ description_html|safe }}</div>
    {% else %}
      <p class="muted">No description provided by the source — open the original posting for details.</p>
    {% endif %}
  </div>

  <footer class="jd-foot">
    <div class="jd-primary">
      <a class="btn secondary" href="{{ job.url }}" target="_blank" rel="noopener noreferrer">
        Open original posting ↗
      </a>
      {#- Apply: today it opens the posting and marks the job applied (human applies). The auto-fill
          agent lands in Track D and will hook onto this same button. -#}
      {#- When apply.enabled (Track D) this launches the LOCAL headful fill agent; otherwise it opens
          the posting + marks applied (Track B). app.js branches on data-apply-mode. -#}
      <button type="button" class="btn apply-btn" data-apply-uid="{{ job.job_uid }}"
              data-apply-url="{{ job.url }}"
              data-apply-mode="{{ 'agent' if apply_enabled else 'open' }}">
        {{ '✓ Applied' if job.applied else ('Auto-apply ▶' if apply_enabled else 'Apply ↗') }}
      </button>
      {#- Tailor: build a role-tailored résumé PDF from your profile (Track D Step 0, no browser). -#}
      <button type="button" class="btn secondary tailor-btn" data-tailor-uid="{{ job.job_uid }}">
        Tailor résumé
      </button>
    </div>
    <div class="jd-tailor" data-uid="{{ job.job_uid }}"></div>
    <div class="jd-secondary actions">{{ quick_actions(job) }}</div>
    <p class="jd-note muted">
      {% if apply_enabled %}<b>Auto-apply</b> opens a local browser, fills the form from your profile,
      and stops for you to review + submit.{% else %}<b>Apply</b> opens the posting and marks it
      applied (turn on the fill agent with <code>apply.enabled</code> + the <code>[apply]</code>
      extra).{% endif %} <b>Tailor résumé</b> builds a role-tailored PDF from your profile.
    </p>
  </footer>
</div>
